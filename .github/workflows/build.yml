name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # Створюємо Gradle Wrapper, якщо його немає в репозиторії
    - name: Download Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Змінено з assembleRelease на assembleDebug для гарантованого пакування бібліотек
    - name: Build with Gradle
      run: ./gradlew :android:assembleDebug --stacktrace

    # Завантажуємо готовий APK. Шлях змінено на папку debug.
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Stack3D-debug
        path: android/build/outputs/apk/debug/android-debug.apk
